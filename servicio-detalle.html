<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Servicio | ESPROT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body.service-detail-page {
            min-height: 100vh;
            background:
                radial-gradient(circle at top, rgba(220, 38, 38, 0.18), transparent 36%),
                linear-gradient(180deg, rgba(3, 7, 18, 0.94) 0%, rgba(3, 7, 18, 1) 100%);
        }

        .detail-shell {
            padding: 2rem 0 5rem;
        }

        .detail-topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.75rem;
            flex-wrap: wrap;
        }

        .back-button,
        .all-services-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-decoration: none;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-subtle);
            padding: 0.9rem 1.25rem;
            font-weight: 600;
            transition: transform 0.25s ease, border-color 0.25s ease, background 0.25s ease;
        }

        .back-button {
            background: var(--primary);
            color: #fff;
            cursor: pointer;
        }

        .back-button:hover,
        .all-services-link:hover {
            transform: translateY(-2px);
        }

        .all-services-link {
            color: var(--text-light);
            background: rgba(15, 23, 42, 0.65);
        }

        .back-button:hover {
            background: var(--primary-light);
            border-color: rgba(239, 68, 68, 0.6);
        }

        .all-services-link:hover {
            border-color: rgba(239, 68, 68, 0.35);
            background: rgba(17, 24, 39, 0.92);
        }

        .detail-grid {
            display: grid;
            grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
            gap: 2rem;
            align-items: start;
        }

        .gallery-panel,
        .info-panel,
        .narrative-card {
            background: rgba(12, 18, 34, 0.9);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
        }

        .gallery-panel,
        .info-panel {
            padding: 1.5rem;
        }

        .main-figure {
            position: relative;
            width: 100%;
            border-radius: calc(var(--radius-lg) - 8px);
            overflow: hidden;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid var(--border-subtle);
        }

        .media-stage {
            position: relative;
            width: 100%;
            min-height: clamp(320px, 58vh, 760px);
            display: grid;
            place-items: center;
            padding: 1rem;
            touch-action: pan-y;
            transition: transform 0.25s ease;
            will-change: transform;
            background:
                radial-gradient(circle at top, rgba(220, 38, 38, 0.14), transparent 44%),
                rgba(15, 23, 42, 0.92);
        }

        .media-stage.is-dragging {
            transition: none;
            cursor: grabbing;
        }

        .gallery-nav-button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 3;
            width: 3rem;
            height: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 999px;
            background: rgba(2, 6, 23, 0.82);
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease, opacity 0.2s ease;
            backdrop-filter: blur(12px);
        }

        .gallery-nav-button:hover {
            background: rgba(220, 38, 38, 0.9);
            border-color: rgba(239, 68, 68, 0.65);
            transform: translateY(-50%) scale(1.05);
        }

        .gallery-nav-button:focus-visible {
            outline: 3px solid rgba(239, 68, 68, 0.55);
            outline-offset: 2px;
        }

        .gallery-nav-button.is-hidden {
            opacity: 0;
            pointer-events: none;
        }

        .gallery-nav-button.prev {
            left: 1rem;
        }

        .gallery-nav-button.next {
            right: 1rem;
        }

        .main-media {
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: min(70vh, 720px);
            display: block;
            object-fit: contain;
            object-position: center;
            user-select: none;
            -webkit-user-drag: none;
        }

        .main-media.is-video {
            background: #020617;
            width: 100%;
        }

        .stage-loading {
            width: 100%;
            min-height: inherit;
            padding: 1.5rem;
            display: grid;
            place-items: center;
            text-align: center;
            color: var(--text-light);
            gap: 0.8rem;
        }

        .stage-loading::before {
            content: '';
            width: 52px;
            height: 52px;
            border-radius: 999px;
            border: 3px solid rgba(255, 255, 255, 0.12);
            border-top-color: var(--primary-light);
            animation: stageSpin 1s linear infinite;
        }

        .stage-loading small {
            color: var(--text-muted);
            line-height: 1.6;
            max-width: 24rem;
        }

        @keyframes stageSpin {
            to {
                transform: rotate(360deg);
            }
        }

        .gallery-caption {
            margin-top: 0.9rem;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .thumb-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(92px, 1fr));
            gap: 0.8rem;
            margin-top: 1.1rem;
        }

        .thumb-button {
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(15, 23, 42, 0.92);
            padding: 0;
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
        }

        .thumb-button img,
        .thumb-button video {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: contain;
            object-position: center;
            background: rgba(15, 23, 42, 0.92);
            display: block;
        }

        .thumb-button video {
            pointer-events: none;
        }

        .thumb-button.is-video::before {
            content: 'Video';
            position: absolute;
            top: 0.55rem;
            left: 0.55rem;
            z-index: 2;
            padding: 0.24rem 0.48rem;
            border-radius: 999px;
            background: rgba(2, 6, 23, 0.88);
            color: #fff;
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .thumb-button.is-video::after {
            content: '▶';
            position: absolute;
            right: 0.55rem;
            bottom: 0.45rem;
            z-index: 2;
            width: 2rem;
            height: 2rem;
            display: grid;
            place-items: center;
            border-radius: 999px;
            background: rgba(220, 38, 38, 0.88);
            color: #fff;
            font-size: 0.78rem;
            box-shadow: 0 8px 16px rgba(220, 38, 38, 0.28);
        }

        .thumb-button:hover,
        .thumb-button[aria-pressed="true"] {
            transform: translateY(-2px);
            border-color: rgba(239, 68, 68, 0.55);
            box-shadow: 0 10px 24px rgba(220, 38, 38, 0.16);
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            margin-bottom: 1rem;
            padding: 0.4rem 0.8rem;
            border-radius: 999px;
            background: rgba(220, 38, 38, 0.12);
            color: #fca5a5;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-size: 0.72rem;
            font-weight: 700;
        }

        .info-panel h1 {
            font-size: clamp(2rem, 4vw, 3rem);
            line-height: 1.08;
            margin-bottom: 1rem;
        }

        .lead {
            color: var(--text-muted);
            font-size: 1.05rem;
            line-height: 1.8;
            margin-bottom: 1.4rem;
        }

        .meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
            margin-bottom: 1.5rem;
        }

        .meta-chip {
            padding: 0.55rem 0.9rem;
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: var(--text-light);
            font-size: 0.88rem;
        }

        .stat-strip {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 0.9rem;
        }

        .stat-card {
            padding: 1rem;
            border-radius: var(--radius-md);
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-card span {
            display: block;
            color: var(--text-muted);
            font-size: 0.82rem;
            margin-bottom: 0.35rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .stat-card strong {
            display: block;
            font-size: 1rem;
            line-height: 1.4;
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .narrative-card {
            padding: 1.5rem;
        }

        .narrative-card h2 {
            font-size: 1.35rem;
            margin-bottom: 1rem;
        }

        .paragraph-stack {
            display: grid;
            gap: 1rem;
        }

        .paragraph-stack p {
            color: var(--text-muted);
            line-height: 1.8;
        }

        .detail-list {
            list-style: none;
            display: grid;
            gap: 0.85rem;
        }

        .detail-list li {
            position: relative;
            padding-left: 1.2rem;
            color: var(--text-muted);
            line-height: 1.7;
        }

        .detail-list li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0.72rem;
            width: 0.42rem;
            height: 0.42rem;
            border-radius: 999px;
            background: var(--primary-light);
            box-shadow: 0 0 0 6px rgba(220, 38, 38, 0.1);
        }

        @media (max-width: 980px) {
            .detail-grid,
            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            .detail-shell {
                padding-top: 1.25rem;
            }

            .gallery-nav-button {
                width: 2.6rem;
                height: 2.6rem;
            }

            .gallery-nav-button.prev {
                left: 0.7rem;
            }

            .gallery-nav-button.next {
                right: 0.7rem;
            }

            .detail-topbar {
                align-items: stretch;
            }

            .back-button,
            .all-services-link {
                width: 100%;
            }

            .stat-strip {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    <main class="detail-shell">
        <div class="container">
            <div class="detail-topbar">

            </div>

            <section class="detail-grid" aria-live="polite">
                <div class="gallery-panel">
                    <figure class="main-figure">
                        <button type="button" id="prevMediaButton" class="gallery-nav-button prev is-hidden" aria-label="Ver imagen anterior">
                            &#10094;
                        </button>
                        <div id="mediaStage" class="media-stage"></div>
                        <button type="button" id="nextMediaButton" class="gallery-nav-button next is-hidden" aria-label="Ver imagen siguiente">

                <div class="info-panel">

                    <div id="serviceTags" class="meta-row"></div>

                        </div>
                        <div class="stat-card">
                            <span>Cobertura</span>

                        <div class="stat-card">
                            <span>Operacion</span>
                            <strong id="serviceResponse"></strong>
                        </div>
                    </div>
                </div>
            </section>

            <section class="content-grid">
                <article class="narrative-card">
                    <h2>Descripcion detallada</h2>
                    <div id="serviceDescription" class="paragraph-stack"></div>
                </article>

                <article class="narrative-card">
                    <h2>Incluye</h2>

                <article class="narrative-card">

                </article>

                <article class="narrative-card">
                    <h2>Ideal para</h2>
                    <ul id="serviceIdealFor" class="detail-list"></ul>
                </article>
            </section>
        </div>
    </main>

                    ),

        const mediaStage = document.getElementById('mediaStage');
        const prevMediaButton = document.getElementById('prevMediaButton');
        const nextMediaButton = document.getElementById('nextMediaButton');
        const galleryCaption = document.getElementById('galleryCaption');
        const thumbGrid = document.getElementById('thumbGrid');
        const serviceTitle = document.getElementById('serviceTitle');
        const serviceSummary = document.getElementById('serviceSummary');
        const serviceTags = document.getElementById('serviceTags');
        const serviceMode = document.getElementById('serviceMode');
        const serviceCoverage = document.getElementById('serviceCoverage');
        const serviceResponse = document.getElementById('serviceResponse');
        const serviceDescription = document.getElementById('serviceDescription');
        const serviceIncludes = document.getElementById('serviceIncludes');
        const serviceBenefits = document.getElementById('serviceBenefits');
        const serviceIdealFor = document.getElementById('serviceIdealFor');

        const generatedMediaCache = new Map();
        const supportedVideoMimeType = typeof MediaRecorder !== 'undefined'
            ? ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm'].find((mimeType) => MediaRecorder.isTypeSupported(mimeType)) || ''
            : '';
        const swipeState = {
            startX: 0,
            startY: 0,
            pointerId: null,
            isDragging: false
        };

        let activeService = null;
        let activeMediaToken = 0;
        let activeMediaIndex = 0;

        function renderParagraphs(target, paragraphs) {
            target.innerHTML = '';

            paragraphs.forEach((paragraph) => {
                const node = document.createElement('p');
                node.textContent = paragraph;
                target.appendChild(node);
            });
        }

        function renderList(target, items) {
            target.innerHTML = '';

            items.forEach((item) => {
                const node = document.createElement('li');
                node.textContent = item;
                target.appendChild(node);
            });
        }

        function easeInOutQuad(value) {
            return value < 0.5
                ? 2 * value * value
                : 1 - Math.pow(-2 * value + 2, 2) / 2;
        }

        function getGalleryItemType(item) {
            return item.type || 'image';
        }

        function getThumbSource(item) {
            if (item.thumb) {
                return item.thumb;
            }

            if (item.poster) {
                return item.poster;
            }

            if (item.frames && item.frames.length) {
                return item.frames[0];
            }

            return item.src;
        }

        function setPressedThumb(index) {
            thumbGrid.querySelectorAll('.thumb-button').forEach((button, buttonIndex) => {
                button.setAttribute('aria-pressed', buttonIndex === index ? 'true' : 'false');
            });
        }

        function resetSwipeFeedback() {
            mediaStage.style.transform = '';
            mediaStage.classList.remove('is-dragging');
        }

        function updateGalleryControls() {
            if (!activeService || !activeService.gallery) {
                prevMediaButton.classList.add('is-hidden');
                nextMediaButton.classList.add('is-hidden');
                return;
            }

            const shouldShowControls = activeService.gallery.length > 1;

            prevMediaButton.classList.toggle('is-hidden', !shouldShowControls);
            nextMediaButton.classList.toggle('is-hidden', !shouldShowControls);
        }

        function navigateMedia(step) {
            if (!activeService || !activeService.gallery || activeService.gallery.length < 2) {
                return;
            }

            const totalItems = activeService.gallery.length;
            const nextIndex = (activeMediaIndex + step + totalItems) % totalItems;

            if (nextIndex === activeMediaIndex) {
                return;
            }

            setActiveMedia(nextIndex);
        }

        function renderImageInStage(src, alt) {
            mediaStage.innerHTML = '';

            const image = document.createElement('img');
            image.className = 'main-media';
            image.src = src;
            image.alt = alt;
            image.loading = 'eager';

            mediaStage.appendChild(image);
        }

        function renderVideoInStage(src, poster, alt) {
            mediaStage.innerHTML = '';

            const video = document.createElement('video');
            video.className = 'main-media is-video';
            video.src = src;
            video.poster = poster || '';
            video.controls = true;
            video.autoplay = true;
            video.muted = true;
            video.loop = true;
            video.playsInline = true;
            video.preload = 'auto';
            video.setAttribute('aria-label', alt);

            mediaStage.appendChild(video);
            video.play().catch(() => {});
        }

        function showStageLoading(caption) {
            mediaStage.innerHTML = '';

            const loader = document.createElement('div');
            loader.className = 'stage-loading';

            const title = document.createElement('strong');
            title.textContent = 'Preparando video';

            const note = document.createElement('small');
            note.textContent = 'Generando un clip breve a partir del material visual del servicio. Esto puede tardar unos segundos la primera vez.';

            loader.appendChild(title);
            loader.appendChild(note);
            mediaStage.appendChild(loader);
            galleryCaption.textContent = caption;
        }

        function drawCoverFrame(ctx, image, width, height, zoom, focusX, focusY) {
            const scale = Math.max(width / image.width, height / image.height) * zoom;
            const drawWidth = image.width * scale;
            const drawHeight = image.height * scale;
            const x = (width - drawWidth) * focusX;
            const y = (height - drawHeight) * focusY;

            ctx.drawImage(image, x, y, drawWidth, drawHeight);
        }

        function renderGeneratedVideoFrame(ctx, frames, progress, width, height) {
            ctx.clearRect(0, 0, width, height);

            const span = Math.max(frames.length - 1, 1);
            const scaledProgress = progress * span;
            const baseIndex = Math.min(frames.length - 1, Math.floor(scaledProgress));
            const nextIndex = Math.min(frames.length - 1, baseIndex + 1);
            const localProgress = baseIndex === nextIndex ? progress : scaledProgress - baseIndex;
            const eased = easeInOutQuad(Math.min(Math.max(localProgress, 0), 1));

            const baseFocusX = baseIndex % 2 === 0 ? 0.46 : 0.54;
            const nextFocusX = nextIndex % 2 === 0 ? 0.54 : 0.46;

            drawCoverFrame(ctx, frames[baseIndex], width, height, 1.06 + eased * 0.06, baseFocusX, 0.5);

            if (nextIndex !== baseIndex) {
                ctx.save();
                ctx.globalAlpha = eased;
                drawCoverFrame(ctx, frames[nextIndex], width, height, 1.08 + (1 - eased) * 0.04, nextFocusX, 0.5);
                ctx.restore();
            }

            const overlay = ctx.createLinearGradient(0, 0, 0, height);
            overlay.addColorStop(0, 'rgba(2, 6, 23, 0.05)');
            overlay.addColorStop(1, 'rgba(2, 6, 23, 0.18)');
            ctx.fillStyle = overlay;
            ctx.fillRect(0, 0, width, height);
        }

        function loadImageAsset(src) {
            return new Promise((resolve, reject) => {
                const image = new Image();
                image.onload = () => resolve(image);
                image.onerror = () => reject(new Error(`No se pudo cargar ${src}`));
                image.src = src;
            });
        }

        async function generateVideoClip(item) {
            if (!supportedVideoMimeType || typeof HTMLCanvasElement === 'undefined' || !HTMLCanvasElement.prototype.captureStream) {
                return null;
            }

            const cacheKey = JSON.stringify({
                frames: item.frames,
                poster: item.poster,
                caption: item.caption
            });

            if (generatedMediaCache.has(cacheKey)) {
                return generatedMediaCache.get(cacheKey);
            }

            const promise = (async () => {
                const frames = await Promise.all(item.frames.map((frameSrc) => loadImageAsset(frameSrc)));
                const canvas = document.createElement('canvas');
                const width = 960;
                const height = 720;
                const fps = 12;
                const durationMs = Math.max(3200, frames.length * 1400);
                const ctx = canvas.getContext('2d');

                canvas.width = width;
                canvas.height = height;

                const stream = canvas.captureStream(fps);
                const recorder = new MediaRecorder(stream, {
                    mimeType: supportedVideoMimeType,
                    videoBitsPerSecond: 1400000
                });

                const chunks = [];
                recorder.ondataavailable = (event) => {
                    if (event.data && event.data.size > 0) {
                        chunks.push(event.data);
                    }
                };

                const stopResult = new Promise((resolve, reject) => {
                    recorder.onerror = (event) => {
                        reject(event.error || new Error('No se pudo generar el video.'));
                    };

                    recorder.onstop = () => {
                        stream.getTracks().forEach((track) => track.stop());

                        if (!chunks.length) {
                            reject(new Error('No se pudo generar el video.'));
                            return;
                        }

                        const blob = new Blob(chunks, { type: supportedVideoMimeType });
                        resolve(URL.createObjectURL(blob));
                    };
                });

                recorder.start(250);

                await new Promise((resolve) => {
                    const start = performance.now();

                    function draw(now) {
                        const progress = Math.min(1, (now - start) / durationMs);
                        renderGeneratedVideoFrame(ctx, frames, progress, width, height);

                        if (progress < 1) {
                            requestAnimationFrame(draw);
                            return;
                        }

                        setTimeout(resolve, 250);
                    }

                    requestAnimationFrame(draw);
                });

                recorder.stop();
                return stopResult;
            })().catch((error) => {
                generatedMediaCache.delete(cacheKey);
                console.error('Error generando video para la galeria:', error);
                return null;
            });

            generatedMediaCache.set(cacheKey, promise);
            return promise;
        }

        async function setActiveMedia(mediaIndex) {
            if (!activeService || !activeService.gallery[mediaIndex]) {
                return;
            }

            const item = activeService.gallery[mediaIndex];
            const mediaType = getGalleryItemType(item);
            const renderToken = ++activeMediaToken;

            activeMediaIndex = mediaIndex;
            resetSwipeFeedback();
            setPressedThumb(mediaIndex);
            galleryCaption.textContent = item.caption;

            if (mediaType === 'video') {
                if (item.source !== 'generated') {
                    renderVideoInStage(item.src, item.poster || '', item.alt);
                    return;
                }

                showStageLoading(item.caption);

                const videoSource = await generateVideoClip(item);

                if (renderToken !== activeMediaToken) {
                    return;
                }

                if (!videoSource) {
                    renderImageInStage(getThumbSource(item), item.alt);
                    galleryCaption.textContent = `${item.caption} Este navegador no pudo preparar el video, asi que se muestra una vista previa.`;
                    return;
                }

                renderVideoInStage(videoSource, item.poster || getThumbSource(item), item.alt);
                return;
            }

            renderImageInStage(item.src, item.alt);
        }

        function renderGallery(gallery) {
            thumbGrid.innerHTML = '';
            activeMediaIndex = 0;
            updateGalleryControls();

            gallery.forEach((item, index) => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'thumb-button';

                if (getGalleryItemType(item) === 'video') {
                    button.classList.add('is-video');
                }

                button.setAttribute('aria-pressed', 'false');
                button.setAttribute(
                    'aria-label',
                    `Ver ${getGalleryItemType(item) === 'video' ? 'video' : 'imagen'} ${index + 1} de la galeria`
                );

                let preview;

                if (getGalleryItemType(item) === 'video' && item.source !== 'generated') {
                    preview = document.createElement('video');
                    preview.src = item.src;
                    preview.muted = true;
                    preview.loop = true;
                    preview.autoplay = true;
                    preview.playsInline = true;
                    preview.preload = 'metadata';
                    preview.setAttribute('aria-hidden', 'true');
                    preview.disablePictureInPicture = true;
                    preview.addEventListener('loadeddata', () => {
                        preview.play().catch(() => {});
                    });
                } else {
                    preview = document.createElement('img');
                    preview.src = getThumbSource(item);
                    preview.alt = item.alt;
                    preview.loading = 'lazy';
                }

                button.appendChild(preview);
                button.addEventListener('click', () => setActiveMedia(index));
                thumbGrid.appendChild(button);
            });

            setActiveMedia(0);
        }

        function handleSwipeStart(event) {
            if (!activeService || activeService.gallery.length < 2) {
                return;
            }

            if (event.pointerType === 'mouse' && event.button !== 0) {
                return;
            }

            if (event.target.closest('video')) {
                return;
            }

            swipeState.startX = event.clientX;
            swipeState.startY = event.clientY;
            swipeState.pointerId = event.pointerId;
            swipeState.isDragging = true;
            mediaStage.classList.add('is-dragging');

            if (typeof mediaStage.setPointerCapture === 'function') {
                try {
                    mediaStage.setPointerCapture(event.pointerId);
                } catch (error) {
                    console.debug('No se pudo capturar el puntero para el carrusel.', error);
                }
            }
        }

        function handleSwipeMove(event) {
            if (!swipeState.isDragging || event.pointerId !== swipeState.pointerId) {
                return;
            }

            const deltaX = event.clientX - swipeState.startX;
            const deltaY = event.clientY - swipeState.startY;

            if (Math.abs(deltaX) <= Math.abs(deltaY)) {
                return;
            }

            mediaStage.style.transform = `translateX(${Math.max(-90, Math.min(90, deltaX * 0.22))}px)`;
        }

        function finishSwipe(event) {
            if (!swipeState.isDragging || event.pointerId !== swipeState.pointerId) {
                return;
            }

            const deltaX = event.clientX - swipeState.startX;
            const deltaY = event.clientY - swipeState.startY;

            swipeState.isDragging = false;
            swipeState.pointerId = null;

            if (typeof mediaStage.releasePointerCapture === 'function') {
                try {
                    mediaStage.releasePointerCapture(event.pointerId);
                } catch (error) {
                    console.debug('No se pudo liberar el puntero del carrusel.', error);
                }
            }

            resetSwipeFeedback();

            if (Math.abs(deltaX) < 60 || Math.abs(deltaX) <= Math.abs(deltaY)) {
                return;
            }

            navigateMedia(deltaX < 0 ? 1 : -1);
        }

        function cancelSwipe() {
            swipeState.isDragging = false;
            swipeState.pointerId = null;
            resetSwipeFeedback();
        }

        function setupMediaCarousel() {
            if (mediaStage.dataset.carouselReady === 'true') {
                return;
            }

            mediaStage.dataset.carouselReady = 'true';
            prevMediaButton.addEventListener('click', () => navigateMedia(-1));
            nextMediaButton.addEventListener('click', () => navigateMedia(1));
            mediaStage.addEventListener('pointerdown', handleSwipeStart);
            mediaStage.addEventListener('pointermove', handleSwipeMove);
            mediaStage.addEventListener('pointerup', finishSwipe);
            mediaStage.addEventListener('pointercancel', cancelSwipe);
            mediaStage.addEventListener('pointerleave', (event) => {
                if (event.pointerType === 'mouse') {
                    cancelSwipe();
                }
            });
        }

        function renderTags(tags) {
            serviceTags.innerHTML = '';

            tags.forEach((tag) => {
                const chip = document.createElement('span');
                chip.className = 'meta-chip';
                chip.textContent = tag;
                serviceTags.appendChild(chip);
            });
        }

        function renderService(serviceKey) {
            const selectedService = SERVICE_DETAILS[serviceKey] || SERVICE_DETAILS['custodio'];

            activeService = {
                ...selectedService,
                gallery: selectedService.gallery.map((item) => ({
                    type: 'image',
                    ...item
                }))
            };

            document.title = `${activeService.title} | ESPROT`;
            serviceTitle.textContent = activeService.title;
            serviceSummary.textContent = activeService.summary;
            serviceMode.textContent = activeService.mode;
            serviceCoverage.textContent = activeService.coverage;
            serviceResponse.textContent = activeService.response;

            renderTags(activeService.tags);
            renderParagraphs(serviceDescription, activeService.description);
            renderList(serviceIncludes, activeService.includes);
            renderList(serviceBenefits, activeService.benefits);
            renderList(serviceIdealFor, activeService.idealFor);
            renderGallery(activeService.gallery);
        }

        function goBack() {
            if (window.history.length > 1 && document.referrer) {
                window.history.back();
                return;
            }

            if (window.opener && !window.opener.closed) {
                window.close();
                return;
            }

            window.location.href = 'index.html#servicios';
        }

        const params = new URLSearchParams(window.location.search);
        setupMediaCarousel();
        renderService(params.get('servicio') || 'custodio');

        window.goBack = goBack;
    </script>
